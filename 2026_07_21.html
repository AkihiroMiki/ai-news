<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ニュース — 2026年7月21日号</title>
<script src="https://unpkg.com/budoux/bundle/budoux-ja.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #07090f; color: #e2e4f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

canvas#stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ── Onboarding overlay ── */
.onboard {
  position: fixed; inset: 0; z-index: 200;
  display: flex; align-items: center; justify-content: center;
  background: rgba(7,9,15,0.85); backdrop-filter: blur(6px);
  transition: opacity 0.5s ease;
}
.onboard.hidden { opacity: 0; pointer-events: none; }
.onboard-card {
  background: rgba(20,23,40,0.96); border: 1px solid rgba(108,99,255,0.35);
  border-radius: 20px; padding: 2.4rem 2.8rem; max-width: 380px; width: 90%;
  text-align: center;
  box-shadow: 0 0 60px rgba(108,99,255,0.2);
}
.onboard-title {
  font-size: 1.1rem; font-weight: 700; color: #c5c0f0;
  letter-spacing: 0.08em; margin-bottom: 1.4rem;
}
.onboard-rows { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.8rem; }
.onboard-row {
  display: flex; align-items: center; gap: 14px;
  background: rgba(108,99,255,0.08); border-radius: 12px;
  padding: 12px 16px; text-align: left;
}
.onboard-icon { font-size: 1.4rem; flex-shrink: 0; }
.onboard-row p { font-size: 0.84rem; line-height: 1.5; color: #8b8fa8; }
.onboard-row strong { color: #c5c0f0; font-weight: 600; }
.onboard-btn {
  display: inline-block; padding: 10px 32px;
  background: linear-gradient(135deg, #6c63ff, #00c9a7);
  border: none; border-radius: 999px; color: #fff;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: opacity 0.2s;
}
.onboard-btn:hover { opacity: 0.85; }
.onboard-timer {
  font-size: 0.72rem; color: rgba(139,143,168,0.4);
  margin-top: 10px;
}

/* ── Header ── */
.header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 16px 24px;
  display: flex; align-items: center; gap: 16px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 1.3rem; font-weight: 800; letter-spacing: 0.18em; color: #fff;
  text-shadow: 0 0 24px rgba(108,99,255,0.8), 0 0 48px rgba(108,99,255,0.4);
  text-decoration: none; flex-shrink: 0;
}
.logo-dot {
  width: 10px; height: 10px; border-radius: 50%; background: #6c63ff;
  box-shadow: 0 0 8px #6c63ff, 0 0 16px #6c63ff;
  animation: dotPulse 1.8s ease-in-out infinite;
}
@keyframes dotPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.6} }

.issue-date {
  font-size: 0.72rem; color: rgba(139,143,168,0.55);
  letter-spacing: 0.06em; border-left: 1px solid rgba(108,99,255,0.3);
  padding-left: 14px; flex-shrink: 0;
}

.header-center { flex: 1; text-align: center; }
.counter {
  font-size: 0.78rem; color: rgba(139,143,168,0.55);
  letter-spacing: 0.12em; font-variant-numeric: tabular-nums;
}
.total-hint {
  font-size: 0.65rem; color: rgba(139,143,168,0.35);
  letter-spacing: 0.04em;
}

.menu-btn {
  background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.3);
  border-radius: 10px; width: 40px; height: 40px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0;
}
.menu-btn:hover { background: rgba(108,99,255,0.25); }
.menu-btn span { display: block; width: 18px; height: 2px; background: #a0a5c0; border-radius: 1px; transition: all 0.3s; }
.menu-btn.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.menu-btn.open span:nth-child(2) { opacity: 0; }
.menu-btn.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── Backnumber drawer ── */
.drawer-overlay {
  position: fixed; inset: 0; z-index: 90;
  background: rgba(7,9,15,0.7); backdrop-filter: blur(4px);
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }
.drawer {
  position: fixed; top: 0; right: -340px; bottom: 0; width: 320px; z-index: 100;
  background: #0d0f1a; border-left: 1px solid rgba(108,99,255,0.2);
  padding: 24px 20px; transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto;
}
.drawer.open { right: 0; }
.drawer-title {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.15em;
  color: rgba(139,143,168,0.45); text-transform: uppercase;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid rgba(108,99,255,0.12);
}
.backnumber-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.bn-item a {
  display: block; padding: 14px 14px; border-radius: 12px;
  text-decoration: none; color: #8b8fa8;
  border: 1px solid transparent; transition: all 0.2s;
}
.bn-item a:hover { background: rgba(108,99,255,0.1); color: #c5c0f0; border-color: rgba(108,99,255,0.2); }
.bn-item.current a { background: rgba(108,99,255,0.12); color: #b0a8ff; border-color: rgba(108,99,255,0.28); }
.bn-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.bn-date { font-size: 0.8rem; font-weight: 600; }
.bn-badge { font-size: 0.62rem; font-weight: 700; background: #6c63ff; color: #fff; padding: 2px 8px; border-radius: 999px; }
.bn-headline { font-size: 0.75rem; color: rgba(139,143,168,0.6); line-height: 1.4; }
.bn-item.current .bn-headline { color: rgba(176,168,255,0.6); }

/* ── Characters ── */
.char { position: fixed; z-index: 10; pointer-events: none; filter: drop-shadow(0 0 20px var(--glow)); }
.char-earth { bottom: 20px; left: 50px; --glow: rgba(47,127,217,0.55); }
.char-robot { bottom: -20px; right: 60px; --glow: rgba(55,230,255,0.4); }
.char-ghost { top: 60px; left: 160px; --glow: rgba(124,92,255,0.55); }

/* ── News area ── */
.news-area {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20; width: 600px;
  display: flex; align-items: stretch; gap: 16px;
}

/* ── Bubble ── */
.bubble-wrap { flex: 1; position: relative; }
.bubble-frame { position: relative; }
.bubble-border-anim {
  position: absolute; inset: -2px; border-radius: 26px; z-index: 0;
  overflow: hidden;
}
.bubble-border-anim::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: conic-gradient(#6c63ff 0%, #00c9a7 25%, #ff5a7a 50%, #6c63ff 75%, #00c9a7 100%);
  animation: rotateBorder 4s linear infinite;
}
@keyframes rotateBorder { to { transform: rotate(360deg); } }
.bubble {
  position: relative;
  z-index: 1;
  background: linear-gradient(145deg, rgba(22,25,45,0.97), rgba(14,17,32,0.97));
  border-radius: 24px; padding: 2.2rem 2.5rem 2rem; overflow: hidden;
}
.bubble-inner { position: relative; }

.corner { position: absolute; width: 18px; height: 18px; z-index: 2; pointer-events: none; }
.corner::before, .corner::after { content: ''; position: absolute; background: #6c63ff; }
.corner::before { width: 2px; height: 100%; }
.corner::after  { width: 100%; height: 2px; }
.corner.tl { top: 10px; left: 10px; }
.corner.tr { top: 10px; right: 10px; transform: scaleX(-1); }
.corner.bl { bottom: 10px; left: 10px; transform: scaleY(-1); }
.corner.br { bottom: 10px; right: 10px; transform: scale(-1); }

.scanline {
  position: absolute; inset: 0; z-index: 2; border-radius: 22px;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(108,99,255,0.018) 3px, rgba(108,99,255,0.018) 4px);
  pointer-events: none;
}
.inner-glow {
  position: absolute; inset: 0; z-index: 1; border-radius: 22px;
  box-shadow: inset 0 0 40px rgba(108,99,255,0.1), inset 0 2px 0 rgba(255,255,255,0.06);
  pointer-events: none;
}
.bubble-tail { display: none; }

/* ── News card ── */
.news-card { transition: opacity 0.3s ease, transform 0.3s ease; }
.news-card.exit-prev { opacity: 0; transform: translateY(-16px); }
.news-card.exit-next { opacity: 0; transform: translateY(16px); }
.news-card.enter-from-next { opacity: 0; transform: translateY(16px); }
.news-card.enter-from-prev { opacity: 0; transform: translateY(-16px); }

.tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 12px; border-radius: 999px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 0.9rem;
}
.tag::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.tag-model    { background: rgba(192,132,252,0.12); color: #c084fc; border: 1px solid rgba(192,132,252,0.25); }
.tag-agent    { background: rgba(52,211,153,0.12);  color: #34d399; border: 1px solid rgba(52,211,153,0.25); }
.tag-eng      { background: rgba(96,165,250,0.12);  color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }
.tag-security { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
.tag-creative { background: rgba(251,146,60,0.12);  color: #fb923c; border: 1px solid rgba(251,146,60,0.25); }

.news-link { text-decoration: none; display: block; }
.news-title {
  font-size: 2.2rem; font-weight: 800; line-height: 1.35; color: #eceeff;
  margin-bottom: 0.8rem; transition: color 0.2s;
  text-shadow: 0 0 32px rgba(108,99,255,0.4);
}
.news-link:hover .news-title { color: #c4bcff; }
.news-link-hint {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 0.78rem; color: rgba(108,99,255,0.65);
  margin-top: 0.5rem; transition: color 0.2s;
}
.news-link:hover .news-link-hint { color: rgba(108,99,255,0.95); }
.news-link-hint::after { content: '↗'; font-size: 0.85rem; }
.news-summary { font-size: 0.92rem; line-height: 1.85; color: #8b8fa8; margin-top: 0.7rem; }

/* Engineer highlight */
.news-highlight {
  margin-top: 0.85rem;
  padding: 0.55rem 0.85rem;
  background: rgba(108,99,255,0.08);
  border-left: 2px solid rgba(108,99,255,0.45);
  border-radius: 0 8px 8px 0;
  font-size: 0.8rem; line-height: 1.65; color: #00c9a7;
}
.news-highlight::before {
  content: 'ENG ';
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.1em;
  opacity: 0.6; margin-right: 2px;
}

/* Share button */
.share-row { display: flex; align-items: center; justify-content: flex-end; margin-top: 0.8rem; }
.share-btn {
  background: none; border: 1px solid rgba(108,99,255,0.25); border-radius: 8px;
  padding: 4px 12px; font-size: 0.72rem; color: rgba(139,143,168,0.6);
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px;
}
.share-btn:hover { background: rgba(108,99,255,0.1); color: #a89fff; border-color: rgba(108,99,255,0.4); }
.share-btn.copied { color: #34d399; border-color: rgba(52,211,153,0.4); }

/* Read dots on vbar */
.vbar-dot.read { background: rgba(108,99,255,0.5); }

/* ── Vertical progress bar ── */
.vbar {
  width: 20px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px 0; flex-shrink: 0;
}
.vbar-track {
  width: 3px; flex: 1; background: rgba(108,99,255,0.12);
  border-radius: 2px; position: relative; max-height: 260px;
}
.vbar-thumb {
  position: absolute; left: 0; right: 0;
  background: linear-gradient(180deg, #6c63ff, #00c9a7);
  border-radius: 2px; box-shadow: 0 0 6px rgba(108,99,255,0.6);
  transition: top 0.35s cubic-bezier(0.4,0,0.2,1), height 0.35s cubic-bezier(0.4,0,0.2,1);
}
.vbar-dots { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
.vbar-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: rgba(108,99,255,0.18); cursor: pointer;
  transition: all 0.25s; flex-shrink: 0;
}
.vbar-dot.active { background: #6c63ff; box-shadow: 0 0 6px #6c63ff; transform: scale(1.3); }

/* ── Scroll hint ── */
.scroll-hint {
  text-align: center; font-size: 0.7rem;
  color: rgba(139,143,168,0.4); margin-top: 0.9rem; position: relative; z-index: 1;
  animation: hintPulse 2.5s ease-in-out infinite;
}
@keyframes hintPulse { 0%,100%{opacity:.4;transform:translateY(0)} 50%{opacity:.9;transform:translateY(3px)} }

/* ── Resume toast ── */
.resume-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(20,23,40,0.95); border: 1px solid rgba(108,99,255,0.3);
  border-radius: 12px; padding: 10px 20px;
  font-size: 0.8rem; color: #c5c0f0; z-index: 60;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 0 20px rgba(108,99,255,0.15);
  animation: toastIn 0.3s ease;
}
@keyframes toastIn { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translate(-50%,0)} }
.resume-toast button {
  background: rgba(108,99,255,0.2); border: none; border-radius: 6px;
  padding: 3px 10px; font-size: 0.75rem; color: #a89fff; cursor: pointer;
}

/* ── Responsive ── */
@media (max-width: 1100px) {
  .char-earth { bottom: 10px; left: 20px; }
  .char-robot { bottom: -30px; right: 20px; }
  .char-ghost { top: 55px; left: 100px; }
  .news-area { width: 520px; }
}
@media (max-width: 900px) {
  .char-ghost { display: none; }
  .news-area { width: min(500px, calc(100vw - 80px)); }
  .char-earth svg { width: 120px; height: 120px; }
  .char-robot svg { width: 110px; height: 140px; }
}
@media (max-width: 600px) {
  .news-area { width: calc(100vw - 32px); top: 48%; }
  .char-earth { bottom: 0; left: 8px; }
  .char-robot { bottom: -30px; right: 8px; }
  .char-earth svg { width: 85px; height: 85px; }
  .char-robot svg { width: 75px; height: 95px; }
  .bubble { padding: 1.4rem 1.3rem 1.3rem; }
  .news-title { font-size: 1.4rem; }
  .logo { font-size: 1.1rem; letter-spacing: 0.12em; }
  .issue-date { display: none; }
  .drawer { width: 280px; right: -280px; }
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- Onboarding -->
<div class="onboard" id="onboard">
  <div class="onboard-card">
    <div class="onboard-title">AI NEWS の使い方</div>
    <div class="onboard-rows">
      <div class="onboard-row">
        <div class="onboard-icon">🖱️</div>
        <p><strong>PC</strong>：スクロールまたは ↑ ↓ キーでニュースを切り替え</p>
      </div>
      <div class="onboard-row">
        <div class="onboard-icon">👆</div>
        <p><strong>スマホ</strong>：上下スワイプで切り替え</p>
      </div>
      <div class="onboard-row">
        <div class="onboard-icon">🔗</div>
        <p>タイトルをタップで<strong>元記事へ</strong>。右上メニューで<strong>バックナンバー</strong>を参照</p>
      </div>
    </div>
    <button class="onboard-btn" id="onboardBtn">はじめる</button>
    <div class="onboard-timer" id="onboardTimer">5秒後に自動で閉じます</div>
  </div>
</div>

<!-- Header -->
<header class="header">
  <a class="logo" href="index.html">
    <div class="logo-dot"></div>
    AI NEWS
  </a>
  <span class="issue-date" id="issueDate">2026年7月21日号</span>
  <div class="header-center">
    <div class="counter" id="counter">01 / 10</div>
    <div class="total-hint">今週のAIニュース 全10本</div>
  </div>
  <button class="menu-btn" id="menuBtn" aria-label="バックナンバー">
    <span></span><span></span><span></span>
  </button>
</header>

<!-- Backnumber drawer -->
<div class="drawer-overlay" id="overlay"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-title">Back Number</div>
  <ul class="backnumber-list" id="backnumberList"></ul>
</aside>

<!-- Characters -->
<div class="char char-earth">
<svg width="170" height="170" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .ef{animation:eFloat 4s ease-in-out infinite}
    .el{animation:eSpin 12s linear infinite}
    .es{animation:eShine 4s ease-in-out infinite}
    .est{animation:eTwink 2s ease-in-out infinite}
    .est2{animation:eTwink 2.6s ease-in-out .8s infinite}
    .est3{animation:eTwink 3.1s ease-in-out 1.4s infinite}
    @keyframes eFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes eSpin{from{transform:translateX(0)}to{transform:translateX(-140px)}}
    @keyframes eShine{0%,100%{opacity:.5}50%{opacity:.9}}
    @keyframes eTwink{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
  </style>
  <circle class="est" cx="30" cy="40" r="2.5" fill="#ffe9a8" style="transform-origin:30px 40px"/>
  <circle class="est2" cx="170" cy="55" r="2" fill="#a8d8ff" style="transform-origin:170px 55px"/>
  <circle class="est3" cx="155" cy="160" r="2.5" fill="#ffe9a8" style="transform-origin:155px 160px"/>
  <g class="ef">
    <circle cx="100" cy="100" r="58" fill="#2f7fd9"/>
    <clipPath id="ec"><circle cx="100" cy="100" r="58"/></clipPath>
    <g clip-path="url(#ec)">
      <g class="el">
        <g fill="#3fbf8f">
          <path d="M60 62q18-10 32 0q10 8-2 16q-16 10-30 2q-10-8 0-18Z"/>
          <path d="M110 95q22-6 30 8q6 12-8 18q-18 8-28-4q-8-12 6-22Z"/>
          <path d="M55 118q14-4 20 6q4 10-8 14q-14 4-20-6q-4-10 8-14Z"/>
          <ellipse cx="152" cy="65" rx="14" ry="9"/>
        </g>
        <g fill="#3fbf8f" transform="translate(140,0)">
          <path d="M60 62q18-10 32 0q10 8-2 16q-16 10-30 2q-10-8 0-18Z"/>
          <path d="M110 95q22-6 30 8q6 12-8 18q-18 8-28-4q-8-12 6-22Z"/>
          <path d="M55 118q14-4 20 6q4 10-8 14q-14 4-20-6q-4-10 8-14Z"/>
          <ellipse cx="152" cy="65" rx="14" ry="9"/>
        </g>
      </g>
      <circle cx="118" cy="115" r="62" fill="#0b2a52" opacity=".25"/>
    </g>
    <ellipse class="es" cx="78" cy="76" rx="16" ry="9" fill="#fff" opacity=".6" transform="rotate(-25 78 76)"/>
    <circle cx="86" cy="102" r="4.5" fill="#0d2b4e"/>
    <circle cx="114" cy="102" r="4.5" fill="#0d2b4e"/>
    <circle cx="87.5" cy="100.5" r="1.5" fill="#fff"/>
    <circle cx="115.5" cy="100.5" r="1.5" fill="#fff"/>
    <path d="M93 114q7 6 14 0" stroke="#0d2b4e" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="74" cy="112" rx="5" ry="3" fill="#ff8fa3" opacity=".55"/>
    <ellipse cx="126" cy="112" rx="5" ry="3" fill="#ff8fa3" opacity=".55"/>
  </g>
</svg>
</div>

<div class="char char-robot">
<svg width="150" height="190" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .rb{animation:rHover 3s ease-in-out infinite}
    .ra{animation:rSway 2.2s ease-in-out infinite;transform-origin:100px 58px}
    .rel{animation:rBlink 1.6s steps(1) infinite}
    .rer{animation:rBlink 1.6s steps(1) .8s infinite}
    .rt{animation:rPing 1.1s ease-in-out infinite;transform-origin:100px 26px}
    .rmb{animation:rLevel 1.4s ease-in-out infinite;transform-origin:center 118px}
    .rmb:nth-of-type(2){animation-delay:.2s}
    .rmb:nth-of-type(3){animation-delay:.4s}
    @keyframes rHover{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes rSway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
    @keyframes rBlink{0%,100%{fill:#37e6ff;opacity:1}50%{fill:#0e6e7d;opacity:.55}}
    @keyframes rPing{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.75)}}
    @keyframes rLevel{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
  </style>
  <g class="rb">
    <g class="ra">
      <line x1="100" y1="58" x2="100" y2="32" stroke="#8b95a8" stroke-width="4" stroke-linecap="round"/>

function updateVbar(i) {
  const thumb = document.getElementById('vbarThumb');
  const total = news.length;
  const pct = i / (total - 1);
  const trackH = document.querySelector('.vbar-track').offsetHeight;
  const thumbH = Math.max(20, trackH / total);
  thumb.style.top  = (pct * (trackH - thumbH)) + 'px';
  thumb.style.height = thumbH + 'px';
  document.querySelectorAll('.vbar-dot').forEach((d, j) => {
    d.classList.toggle('active', j === i);
    d.classList.toggle('read', readSet.has(j));
  });
}

function renderNews(i) {
  const n = news[i];
  document.getElementById('newsTag').className = 'tag ' + n.cls;
  document.getElementById('newsTag').textContent = n.tag;
  document.getElementById('newsLink').href = n.url;
  document.getElementById('newsTitle').textContent = n.title;
  document.getElementById('newsSummary').textContent = n.summary;
  document.getElementById('newsHighlight').textContent = n.highlight;
  document.getElementById('counter').textContent =
    String(i+1).padStart(2,'0') + ' / ' + String(news.length).padStart(2,'0');
  document.getElementById('scrollHint').textContent =
    i === news.length-1 ? '↑ スクロールで前のニュース' : '↓ スクロールで次のニュース';

  readSet.add(i);
  localStorage.setItem(STORAGE_KEY + '-read', JSON.stringify([...readSet]));

  updateVbar(i);
  history.replaceState(null, '', '?item=' + i);
  localStorage.setItem(STORAGE_KEY + '-pos', i);
}

function goTo(next, instant) {
  if (animating || next < 0 || next >= news.length) return;
  if (instant) { current = next; renderNews(current); return; }
  animating = true;
  const card = document.getElementById('newsCard');
  const dir = next > current;
  card.classList.add(dir ? 'exit-prev' : 'exit-next');
  setTimeout(() => {
    current = next;
    renderNews(current);
    card.classList.remove('exit-prev','exit-next');
    card.classList.add(dir ? 'enter-from-next' : 'enter-from-prev');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      card.classList.remove('enter-from-next','enter-from-prev');
      setTimeout(() => { animating = false; }, 320);
    }));
  }, 300);
}

  lastWheel = now;
  goTo(current + (e.deltaY > 0 ? 1 : -1));
}, { passive: false });

window.addEventListener('keydown', e => {
  if (e.key==='ArrowDown'||e.key==='ArrowRight') goTo(current+1);
  if (e.key==='ArrowUp'||e.key==='ArrowLeft')   goTo(current-1);
});

let touchStartY = 0;
window.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchend', e => {
  const dy = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dy) > 40) goTo(current + (dy > 0 ? 1 : -1));
});

  li.className = 'bn-item' + (bn.current ? ' current' : '');
  li.innerHTML = `<a href="${bn.file}">
    <div class="bn-header">
      <span class="bn-date">${bn.label}</span>

    </div>
    <div class="bn-headline">${bn.headline}</div>

/* ── Stars + shooting stars ── */
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); window.addEventListener('resize', () => { resize(); setTimeout(() => updateVbar(current), 50); });

const starData = Array.from({length:200}, () => ({
  x:Math.random(), y:Math.random(),
  r:Math.random()*1.5+0.2,
  op:Math.random()*0.55+0.15,
  tw:Math.random()*Math.PI*2,
  sp:Math.random()*0.012+0.003
}));
const shooters = [];
function spawnShooter() {
  if (shooters.length < 3) shooters.push({ x:Math.random()*0.65, y:Math.random()*0.35, len:70+Math.random()*90, speed:2.5+Math.random()*4, alpha:1 });
  setTimeout(spawnShooter, 3500 + Math.random()*7000);
}
spawnShooter();

function draw(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (const s of starData) {
    const a = s.op*(0.5+0.5*Math.sin(s.tw+t*s.sp));
    ctx.beginPath(); ctx.arc(s.x*canvas.width, s.y*canvas.height, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
  }
  for (let i=shooters.length-1; i>=0; i--) {
    const s=shooters[i];
    s.x+=s.speed*0.0025; s.y+=s.speed*0.0012; s.alpha-=0.016;
    if (s.alpha<=0) { shooters.splice(i,1); continue; }
    const gx=canvas.width*s.x, gy=canvas.height*s.y;
    const grad=ctx.createLinearGradient(gx,gy,gx-s.len*.75,gy-s.len*.38);
    grad.addColorStop(0, `rgba(255,255,255,${s.alpha})`);
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(gx-s.len*.75,gy-s.len*.38);
    ctx.strokeStyle=grad; ctx.lineWidth=1.5; ctx.stroke();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

/* ── Init ── */
const startIdx = !isNaN(urlItem) && urlItem >= 0 && urlItem < news.length ? urlItem
               : savedItem > 0 ? savedItem : 0;
renderNews(startIdx);
current = startIdx;
setTimeout(() => updateVbar(startIdx), 100);

if (savedItem > 0 && isNaN(urlItem) && !localStorage.getItem(seenKey + '-resumed')) {
  setTimeout(() => showResumeToast(savedItem), 1000);
}
